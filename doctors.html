<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors Listing</title>
    <link rel="stylesheet" href="doctors.css">
    <link rel="stylesheet" href="theme.css">
</head>
<body>
    <!-- NAVBAR -->
  <nav>
    <a class="logo" href="home.html">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#00b894" stroke-width="2.2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      Care<span>Flow</span>
    </a>
    <button class="btn-login" onclick="window.location.href='login.html'">Login</button>
  </nav>

  <!-- BREADCRUMB -->
  <div class="breadcrumb">
    <a href="home.html">Home</a> &rsaquo; <span id="specLabel">Cardiology</span>
  </div>

  <!-- TOP BAR -->
  <div class="topbar">
    <h2 id="pageTitle">Cardiologists near you</h2>
    <div class="topbar-right">
      <button class="filter-btn">⚙ Filters</button>
      <select class="sort-select" onchange="sortDoctors(this.value)">
        <option value="wait">Sort by: Wait Time</option>
        <option value="fee">Sort by: Fee</option>
        <option value="patients">Sort by: Patients</option>
      </select>
    </div>
  </div>

  <!-- DOCTOR CARDS -->
  <div class="cards-container" id="cardsContainer"></div>
  <!-- Local DB layer -->
  <script src="db.js"></script>
  <script src="doctors.js"></script>
  <script src="theme.js"></script>
</body>
</html>
